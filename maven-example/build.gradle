plugins {
    id 'java'
    id 'application'
    id 'maven-publish'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'junit:junit:4.12'
}

group = 'com.example'
version = '1.0-SNAPSHOT'
description = 'maven-example'

java {
    sourceCompatibility = JavaVersion.VERSION_1_8
}

application {
    mainClass = 'com.example.App'
}

test {
    useJUnit()
}

publishing {
    publications {
        maven(MavenPublication) {
            from components.java
        }
    }
}